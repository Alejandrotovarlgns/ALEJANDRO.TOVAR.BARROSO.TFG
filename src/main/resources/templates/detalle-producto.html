<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-3">
<div class="container bg-white shadow-sm p-4 rounded-4 text-center" style="max-width: 500px; margin: 0 auto;">
    <img th:src="|https://loremflickr.com/400/400/sneaker,${p.marca}|" class="img-fluid rounded mb-3">

    <h2 th:text="${p.nombre}" class="fw-bold"></h2>
    <p th:text="${p.marca}" class="text-muted text-uppercase"></p>
    <div class="display-6 fw-bold my-3" th:text="${p.precio + ' €'}"></div>

    <div class="badge fs-5 mb-4" th:classappend="${p.stock < 5} ? 'bg-danger' : 'bg-success'">
        Stock de esta variante: [[${p.stock}]] uds
    </div>

    <div class="mt-2 text-start">
        <h5 class="fw-bold mb-3 text-center text-secondary">Disponibilidad por Tallas</h5>
        <div class="table-responsive">
            <table class="table table-hover align-middle text-center">
                <thead class="table-dark">
                <tr>
                    <th>Talla</th>
                    <th>Stock Actual</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="variante : ${variantesTallas}">
                    <td>
                        <span class="fw-semibold text-dark">Talla [[${variante.talla}]]</span>
                    </td>
                    <td>
                            <span class="badge"
                                  th:classappend="${variante.stock == 0} ? 'bg-secondary' : (${variante.stock < 5} ? 'bg-warning text-dark' : 'bg-success')"
                                  th:text="${variante.stock + ' uds'}">
                                0 uds
                            </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
