<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Online - Registro de Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .card-register { width: 400px; border: none; border-radius: 15px; }
    </style>
</head>
<body>
<div class="card card-register shadow p-4">
    <h4 class="fw-bold text-center mb-2">Crear Cuenta</h4>
    <p class="text-muted small text-center mb-4">Regístrate para ver el stock en tiempo real y comprar tus zapatillas favoritas.</p>

    <form th:action="@{/registro}" th:object="${usuario}" method="post">
        <div class="mb-3">
            <label class="form-label fw-bold small">Nombre de usuario</label>
            <input type="text" th:field="*{username}" class="form-control" placeholder="Ej: ale_tovar" required>
        </div>
        <div class="mb-4">
            <label class="form-label fw-bold small">Contraseña</label>
            <input type="password" th:field="*{password}" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-dark w-100 fw-bold mb-3">Registrarme y Entrar</button>
        <div class="text-center">
            <a href="/login" class="small text-secondary text-decoration-none">¿Ya tienes cuenta? Inicia sesión</a>
        </div>
    </form>
</div>
</body>
</html>
